# QueueSight configuration
# Normalize queue polygon points to the input frame size.
queue_region_normalized:
  - [0.15, 0.20]
  - [0.85, 0.20]
  - [0.95, 0.95]
  - [0.05, 0.95]

crowd_thresholds:
  low_max: 2
  medium_max: 5

tracking:
  max_disappeared: 18
  max_distance: 80
  smoothing_window: 12

detector:
  hit_threshold: 0.0
  win_stride: [8, 8]
  padding: [8, 8]
  scale: 1.05
  win_padding_scale: 1.05

display:
  show_ids: true
  font_scale: 0.7
  thickness: 2
